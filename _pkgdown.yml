# ============================================================================
# pkgdown configuration for sobol
# ============================================================================

# Base URL (replace with your own if different)
url: https://alrobles.github.io/sobol/

# Bootstrap version and theme
template:
  bootstrap: 5
  theme: flatly
  # Include a custom CSS if needed (optional)
  # includes:
  #   in_header: inst/include/header.html

# ── Navigation bar ────────────────────────────────────────────────────────────
navbar:
  title: sobol
  type: default
  left:
    - text: "Get Started"
      href: articles/sobol.html
    - text: "Reference"
      href: reference/index.html
    - text: "Articles"
      menu:
        - text: "Performance & Optimisation"
          href: articles/optimisation.html
        - text: "Testing Strategy"
          href: articles/testing.html
        - text: "Precomputed Direction Tables"
          href: articles/table-generation.html
        - text: "S3 Implementation"
          href: articles/s3-implementation.html
    - text: "News"
      href: news/index.html
  right:
    - icon: fa-github
      href: https://github.com/alrobles/sobol

# ── Reference index ───────────────────────────────────────────────────────────
reference:
  - title: "Parameter Space Exploration"
    contents:
      - sobol_design
  - title: "Raw Sequence Generation"
    contents:
      - sobol_points
      - sobol_generator
      - sobol_next
      - sobol_next_n
  - title: "Generator State Management"
    contents:
      - sobol_skip_to
      - sobol_index
      - sobol_dimensions
  - title: "S3 Methods"
    contents:
      - print.sobol_generator
      - summary.sobol_generator
      - print.summary.sobol_generator

# ── Articles ──────────────────────────────────────────────────────────────────
articles:
  # The main “Get Started” vignette appears in the navbar, but we can list it
  # here to control the article index page layout.
  - title: "Get Started"
    contents:
      - sobol
  - title: "Technical Deep Dives"
    contents:
      - optimisation
      - testing
      - table-generation
      - s3-implementation

# ── Home page ─────────────────────────────────────────────────────────────────
home:
  # The sidebar is auto‑populated with links, license, and community.
  # If you want to hide the CRAN badge during network‑free builds, add:
  # sidebar:
  #   structure: [links, license, community]

# ── Footer ────────────────────────────────────────────────────────────────────
footer:
  structure:
    left: [developed_by, built_with]
    right: [legal]
  components:
    developed_by: "Developed by Angel Robles"
    legal: "Licensed under BSD‑3‑Clause"

# ── News ──────────────────────────────────────────────────────────────────────
# If you have a NEWS.md file, pkgdown will turn it into a changelog.
# Uncomment the line below if you create one:
# news:
#   cran_dates: true
