name: R Package Tests

on:
  push:
    branches: [ main, develop, claude/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-r-package:
    name: R ${{ matrix.r-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        r-version: ['4.2', '4.3', '4.4']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.r-version }}
        use-public-rspm: true

    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev

    - name: Query R package dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: |
          any::rcmdcheck
          any::testthat
          any::Rcpp
          any::covr
        needs: check

    - name: Check R package
      uses: r-lib/actions/check-r-package@v2
      with:
        error-on: '"error"'
        args: 'c("--no-manual", "--as-cran")'

    - name: Run R tests
      run: |
        Rscript -e 'testthat::test_dir("tests/testthat")'
      continue-on-error: false

    - name: Test coverage
      if: matrix.os == 'ubuntu-latest' && matrix.r-version == '4.4'
      run: |
        Rscript -e 'covr::package_coverage(type = "tests", quiet = FALSE)'
      continue-on-error: true

  r-cmd-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev

    - name: Query dependencies
      uses: r-lib/actions/setup-r-dependencies@v2
      with:
        extra-packages: |
          any::rcmdcheck
        needs: check

    - name: Check package
      uses: r-lib/actions/check-r-package@v2
      with:
        upload-snapshots: true
        error-on: '"warning"'

  test-examples:
    name: Test R Examples
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'
        use-public-rspm: true

    - name: Install dependencies
      run: |
        install.packages(c("Rcpp", "testthat"))
      shell: Rscript {0}

    - name: Install package
      run: R CMD INSTALL .

    - name: Run examples
      run: |
        Rscript inst/examples/usage_examples.R
      continue-on-error: false
